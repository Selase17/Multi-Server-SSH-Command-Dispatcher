# =============================================================================
# servers.conf — Server List for dispatcher.sh
# =============================================================================
# Each non-comment, non-blank line defines one target server.
# Fields are whitespace-separated (spaces or tabs both work).
#
# Format:
#   HOSTNAME        IP_ADDRESS       SSH_USER
#
# Rules:
#   - HOSTNAME is used for display only — it does not need to be DNS-resolvable
#   - IP_ADDRESS is what SSH actually connects to
#   - SSH_USER must have key-based authentication configured on the target
#   - Lines starting with # are comments and are ignored
#   - Blank lines are ignored
#
# To test locally before pointing at real servers, add your own machine:
#   localhost       127.0.0.1        <your-username>
# =============================================================================

# --- Web Tier ----------------------------------------------------------------
#web-01          192.168.1.10     deploy
#web-02          192.168.1.11     deploy

# --- Database Tier -----------------------------------------------------------
#db-01           192.168.1.20     admin
#db-02           192.168.1.21     admin

localhost       127.0.0.1       pasel

# --- Cache / Queue Tier ------------------------------------------------------
#cache-01        192.168.1.30     deploy

# --- Monitoring --------------------------------------------------------------
#monitor-01      192.168.1.40     ops

